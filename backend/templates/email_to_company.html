<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Project Inquiry — StylarkX</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background-color: #F8F7F4;">
    <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
            <td style="padding: 40px 20px;">
                <table role="presentation" style="max-width: 600px; margin: 0 auto; background-color: #FFFFFF; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(14, 14, 14, 0.06);">
                    
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #0E0E0E; padding: 40px; text-align: center;">
                            <h1 style="margin: 0; font-size: 28px; font-weight: 600; color: #FFFFFF; letter-spacing: -0.02em;">
                                Stylark<span style="color: #B8860B;">X</span>
                            </h1>
                            <p style="margin: 12px 0 0 0; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #6E6E6E;">
                                New Project Inquiry
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 48px 40px;">
                            <!-- Alert Badge -->
                            <div style="background-color: #B8860B; color: #FFFFFF; display: inline-block; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 32px;">
                                🚀 New Inquiry Received
                            </div>
                            
                            <!-- Client Info -->
                            <table role="presentation" style="width: 100%; margin-bottom: 32px;">
                                <tr>
                                    <td style="padding: 16px 0; border-bottom: 1px solid #F0F0F0;">
                                        <p style="margin: 0 0 4px 0; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #B8860B;">
                                            Client Name
                                        </p>
                                        <p style="margin: 0; font-size: 18px; font-weight: 500; color: #0E0E0E;">
                                            {{ name }}
                                        </p>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 16px 0; border-bottom: 1px solid #F0F0F0;">
                                        <p style="margin: 0 0 4px 0; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #B8860B;">
                                            Email Address
                                        </p>
                                        <p style="margin: 0; font-size: 18px; font-weight: 500; color: #0E0E0E;">
                                            <a href="mailto:{{ email }}" style="color: #2F5BFF; text-decoration: none;">{{ email }}</a>
                                        </p>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 16px 0; border-bottom: 1px solid #F0F0F0;">
                                        <p style="margin: 0 0 4px 0; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #B8860B;">
                                            Project Type
                                        </p>
                                        <p style="margin: 0; font-size: 18px; font-weight: 500; color: #0E0E0E;">
                                            {{ project_type }}
                                        </p>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 16px 0;">
                                        <p style="margin: 0 0 4px 0; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #B8860B;">
                                            Submission ID
                                        </p>
                                        <p style="margin: 0; font-size: 18px; font-weight: 500; color: #6E6E6E;">
                                            #{{ submission_id }}
                                        </p>
                                    </td>
                                </tr>
                            </table>
                            
                            <!-- Message -->
                            <div style="background-color: #F8F7F4; border-radius: 12px; padding: 24px; margin-bottom: 32px;">
                                <p style="margin: 0 0 12px 0; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #B8860B;">
                                    Project Message
                                </p>
                                <p style="margin: 0; font-size: 15px; line-height: 1.7; color: #0E0E0E;">
                                    {{ message }}
                                </p>
                            </div>
                            
                            <!-- Reply CTA -->
                            <a href="mailto:{{ email }}?subject=Re: Your Project Inquiry at StylarkX" style="display: inline-block; background-color: #0E0E0E; color: #FFFFFF; padding: 16px 32px; border-radius: 50px; font-size: 14px; font-weight: 500; text-decoration: none; letter-spacing: 0.04em;">
                                Reply to {{ name }}
                            </a>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #F8F7F4; padding: 32px 40px; text-align: center; border-top: 1px solid #E8E8E8;">
                            <p style="margin: 0 0 8px 0; font-size: 14px; font-weight: 600; color: #0E0E0E;">
                                StylarkX
                            </p>
                            <p style="margin: 0; font-size: 12px; color: #6E6E6E;">
                                Full-Stack Engineering Studio
                            </p>
                        </td>
                    </tr>
                    
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
